name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ───────────────────────────────────────────
  # BUILD ENGINE BINARIES
  # ───────────────────────────────────────────
  build-engine:
    name: Build Engine (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build engine
        working-directory: engine
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: engine
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bennett-engine dist/
          cp -r ../docs ../README.md ../LICENSE* dist/ 2>/dev/null || true
          cd dist
          tar czf bennett-engine-${{ matrix.target }}.tar.gz *

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: engine
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/bennett-engine.exe dist/
          cp -r ../docs, ../README.md, ../LICENSE* dist/ 2>$null
          cd dist
          Compress-Archive -Path * -DestinationPath bennett-engine-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.target }}
          path: engine/dist/bennett-engine-*

  # ───────────────────────────────────────────
  # BUILD DESKTOP APPS
  # ───────────────────────────────────────────
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs: build-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: brew install pkg-config cairo pango libpng librsvg pixman

      - name: Download engine binary
        uses: actions/download-artifact@v4
        with:
          name: engine-${{ matrix.os == 'ubuntu-latest' && 'x86_64-unknown-linux-gnu' || matrix.os == 'macos-latest' && 'aarch64-apple-darwin' || 'x86_64-pc-windows-msvc' }}
          path: engine/dist

      - name: Install dependencies
        working-directory: desktop
        run: pnpm install

      - name: Build Tauri
        working-directory: desktop
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            desktop/src-tauri/target/release/bundle/**/*.AppImage
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe
            desktop/src-tauri/target/release/bundle/**/*.dmg

  # ───────────────────────────────────────────
  # CREATE RELEASE
  # ───────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-engine, build-desktop]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's New

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Downloads

            ### Engine (headless)
            - Linux (x86_64): `bennett-engine-x86_64-unknown-linux-gnu.tar.gz`
            - Linux (ARM64): `bennett-engine-aarch64-unknown-linux-gnu.tar.gz`
            - macOS (Intel): `bennett-engine-x86_64-apple-darwin.tar.gz`
            - macOS (Apple Silicon): `bennett-engine-aarch64-apple-darwin.tar.gz`
            - Windows (x86_64): `bennett-engine-x86_64-pc-windows-msvc.zip`

            ### Desktop App
            - Linux: `.AppImage` or `.deb`
            - macOS: `.dmg` (Universal)
            - Windows: `.msi` or `.exe`

            ## Installation

            ```bash
            # macOS
            brew install bennett-studio

            # Linux
            sudo dpkg -i bennett-studio_*.deb
            # or
            chmod +x Bennett-Studio_*.AppImage
            ./Bennett-Studio_*.AppImage

            # Windows
            # Run the .msi installer
            ```
          files: artifacts/**
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

      - name: Publish to crates.io
        if: '!contains(github.ref, ''alpha'') && !contains(github.ref, ''beta'')'
        working-directory: engine
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
