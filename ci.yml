name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ───────────────────────────────────────────
  # RUST ENGINE
  # ───────────────────────────────────────────
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Check formatting
        working-directory: engine
        run: cargo fmt --check

      - name: Run clippy
        working-directory: engine
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        working-directory: engine
        run: cargo test --lib --all-features

  rust-integration:
    name: Rust Integration Tests
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:24-dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Install Docker Compose
        run: |
          docker compose version || pip install docker-compose

      - name: Run integration tests
        working-directory: engine
        run: cargo test --test '*' --all-features
        env:
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock

  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Generate coverage
        working-directory: engine
        run: cargo tarpaulin --out Xml --all-features

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: engine/cobertura.xml
          fail_ci_if_error: true

  # ───────────────────────────────────────────
  # DESKTOP CLIENT (Tauri + React)
  # ───────────────────────────────────────────
  desktop-check:
    name: Desktop Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        working-directory: desktop
        run: pnpm install

      - name: Lint
        working-directory: desktop
        run: pnpm lint

      - name: Type check
        working-directory: desktop
        run: pnpm type-check

      - name: Unit tests
        working-directory: desktop
        run: pnpm test

  desktop-build:
    name: Desktop Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: brew install pkg-config cairo pango libpng librsvg pixman

      - name: Install dependencies
        working-directory: desktop
        run: pnpm install

      - name: Build Tauri
        working-directory: desktop
        run: pnpm tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            desktop/src-tauri/target/release/bundle/**/*.AppImage
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe

  # ───────────────────────────────────────────
  # WEB CLIENT
  # ───────────────────────────────────────────
  web-check:
    name: Web Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        working-directory: web
        run: pnpm install

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Type check
        working-directory: web
        run: pnpm type-check

      - name: Unit tests
        working-directory: web
        run: pnpm test

      - name: Build
        working-directory: web
        run: pnpm build

  # ───────────────────────────────────────────
  # SECURITY AUDIT
  # ───────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        working-directory: engine
        run: cargo audit

      - name: Audit Node.js dependencies
        working-directory: desktop
        run: |
          npm install -g pnpm
          pnpm audit --audit-level high

  # ───────────────────────────────────────────
  # E2E TESTS
  # ───────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [rust-check, desktop-check, web-check]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Playwright
        run: |
          cd desktop
          pnpm install
          pnpm exec playwright install

      - name: Build engine
        working-directory: engine
        run: cargo build --release

      - name: Run E2E tests
        working-directory: desktop
        run: pnpm test:e2e
        env:
          BENNETT_ENGINE_PATH: ${{ github.workspace }}/engine/target/release/bennett-engine
